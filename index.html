<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Leads</title>

<style>
:root {
  --bg: #020617;
  --surface: #0f172a;
  --border: #1f2937;
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --text: #f9fafb;
  --muted: #9ca3af;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  background: var(--bg);
  color: var(--text);
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #020617;
  border-right: 1px solid var(--border);
  padding: 20px 10px;
}

.logo {
  font-weight: bold;
  margin-bottom: 20px;
}

.menu-item {
  padding: 12px;
  border-radius: 10px;
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 6px;
}

.menu-item:hover {
  background: #111827;
  color: white;
}

.menu-item.active {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  color: white;
}

/* CONTENT */
.main {
  flex: 1;
  padding: 20px;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.table tr:hover {
  background: #111827;
}

.btn {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  color: white;
}

.btn-accent {
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: white;
}

</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CONTROLE DE LEADS</div>

  <div class="menu-item active">Leads</div>
  <div class="menu-item">+ Novo Lead</div>
  <div class="menu-item">Mensagens</div>
  <div class="menu-item">Relatórios</div>
  <div class="menu-item">Importar</div>
  <div class="menu-item">Exportar</div>
</div>

<div class="main">
  <h2>Leads</h2>

  <table class="table">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Maria Silva</td>
        <td>48999999999</td>
        <td>Atendimento</td>
        <td>
          <button class="btn btn-primary">WhatsApp</button>
          <button class="btn btn-accent">Editar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
